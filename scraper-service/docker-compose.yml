services:
  scraper:
    build: .
    container_name: yellow-sticker-scraper
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Defaults; anything in .env wins.
      TZ: Europe/London
      HEALTH_PORT: "3000"
    ports:
      # Optional: only needed if you want to hit the /health endpoint from your LAN.
      # The worker does NOT need inbound traffic to do its job.
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
